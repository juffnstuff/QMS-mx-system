<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Accent stripe -->
  <rect x="0" y="380" width="512" height="6" fill="url(#accent)" rx="3"/>
  <!-- Gear icon (subtle, top-right) -->
  <circle cx="410" cy="100" r="32" fill="none" stroke="#1e4976" stroke-width="6"/>
  <circle cx="410" cy="100" r="14" fill="none" stroke="#1e4976" stroke-width="4"/>
  <!-- RFRP text -->
  <text x="256" y="240" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="148" fill="#ffffff" letter-spacing="-4">RFRP</text>
  <!-- Subtitle -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="32" fill="#60a5fa">QMS TRACKER</text>
  <!-- Wrench icon bottom -->
  <g transform="translate(216, 340) scale(0.6)" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round">
    <path d="M20 60 L60 20"/>
    <circle cx="16" cy="64" r="12"/>
    <path d="M100 60 L60 20"/>
    <circle cx="104" cy="64" r="12"/>
  </g>
</svg>
